<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoicAssy Vault</title>
    <!-- Pustaka Utama (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-blob { animation: blob 15s infinite; }
        @keyframes blob { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.15); opacity: 0.6; } }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f8f9fa] text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useLayoutEffect } = React;
        
        /**
         * Komponen Ikon Lucide yang diperbaiki
         * Menggunakan span wrapper untuk mengelakkan ralat DOM (removeChild)
         */
        const Icon = ({ name, className }) => {
            const spanRef = useRef(null);
            useLayoutEffect(() => {
                if (spanRef.current) {
                    spanRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if (className) i.className = className;
                    spanRef.current.appendChild(i);
                    if (window.lucide) {
                        lucide.createIcons({ root: spanRef.current });
                    }
                }
            }, [name, className]);
            return <span ref={spanRef} className="inline-flex items-center justify-center shrink-0"></span>;
        };

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2dPm0Tr55SfLx7raE9DFI7HYsxhlO7SJdXbYNukdQ-Bes9LD9KcoUh3Y4fFIFVXpi/exec";

        function App() {
            const getStoredData = (key, defaultValue) => {
                try {
                    const saved = localStorage.getItem(key);
                    return saved ? JSON.parse(saved) : defaultValue;
                } catch (e) { return defaultValue; }
            };

            const [isAdmin, setIsAdmin] = useState(false);
            const [logoClicks, setLogoClicks] = useState(0);
            const [showPassModal, setShowPassModal] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [passError, setPassError] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [syncStatus, setSyncStatus] = useState(null);
            const [hasCloudError, setHasCloudError] = useState(false);

            const [senaraiAhli, setSenaraiAhli] = useState(() => getStoredData('soicassy_members', []));
            const [records, setRecords] = useState(() => getStoredData('soicassy_records', []));
            const [minAmount, setMinAmount] = useState(() => getStoredData('soicassy_min_amount', 20));
            const [tahunSemasa, setTahunSemasa] = useState(() => getStoredData('soicassy_year', new Date().getFullYear().toString()));

            const senaraiBulan = ['Januari', 'Februari', 'Mac', 'April', 'Mei', 'Jun', 'Julai', 'Ogos', 'September', 'Oktober', 'November', 'Disember'];
            const [bulanSemasa, setBulanSemasa] = useState(senaraiBulan[new Date().getMonth()]);
            const [alertMessage, setAlertMessage] = useState(null);
            const [memberToDelete, setMemberToDelete] = useState(null);
            const [newAhli, setNewAhli] = useState('');
            const [ahliToDeleteDropdown, setAhliToDeleteDropdown] = useState('');
            const [formData, setFormData] = useState({ name: '', month: 'Januari', amount: '', type: 'masuk' });
            const [bulkFormData, setBulkFormData] = useState({ month: 'Januari', amount: '' });

            const senaraiTahun = useMemo(() => {
                const years = [];
                for (let i = 2024; i <= 2050; i++) years.push(i.toString());
                return years;
            }, []);

            // FUNGSI PANGGIL DATA (AUTO) - Dengan Logik Catch Lebih Kuat
            const fetchDataFromCloud = async () => {
                if (!SCRIPT_URL) { 
                    setIsLoading(false); 
                    return; 
                }
                
                setIsLoading(true);
                setHasCloudError(false);
                
                try {
                    // Gunakan fetch dengan mod cors eksplisit
                    const response = await fetch(SCRIPT_URL, { 
                        method: 'GET',
                        mode: 'cors',
                        cache: 'no-cache',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    
                    const cloudData = await response.json();
                    if (cloudData) {
                        setSenaraiAhli(cloudData.senaraiAhli || []);
                        setRecords(cloudData.records || []);
                        setMinAmount(cloudData.minAmount || 20);
                        setTahunSemasa(cloudData.tahunSemasa || new Date().getFullYear().toString());
                        
                        setSyncStatus({ type: 'success', message: 'Data Cloud Berjaya Dimuat!' });
                        setTimeout(() => setSyncStatus(null), 3000);
                    }
                } catch (error) {
                    console.error("Gagal panggil data:", error);
                    setHasCloudError(true);
                    setSyncStatus({ 
                        type: 'error', 
                        message: 'Cloud Gagal. Guna Data Tempatan.' 
                    });
                } finally { 
                    setIsLoading(false); 
                }
            };

            // Jalankan semasa mula
            useEffect(() => { 
                fetchDataFromCloud(); 
            }, []);

            // Simpan ke Cache tempatan
            useEffect(() => {
                localStorage.setItem('soicassy_members', JSON.stringify(senaraiAhli));
                localStorage.setItem('soicassy_records', JSON.stringify(records));
                localStorage.setItem('soicassy_min_amount', JSON.stringify(minAmount));
                localStorage.setItem('soicassy_year', JSON.stringify(tahunSemasa));
            }, [senaraiAhli, records, minAmount, tahunSemasa]);

            const syncToGoogleSheets = async () => {
                if (!SCRIPT_URL) return;
                setIsSyncing(true);
                setSyncStatus(null);
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ records, senaraiAhli, minAmount, tahunSemasa })
                    });
                    setSyncStatus({ type: 'success', message: 'Simpan Cloud Selesai!' });
                    setTimeout(() => setSyncStatus(null), 3000);
                } catch (error) {
                    setSyncStatus({ type: 'error', message: 'Gagal Simpan ke Cloud.' });
                } finally { setIsSyncing(false); }
            };

            const handleLogoClick = () => {
                if (isAdmin) { setIsAdmin(false); setLogoClicks(0); return; }
                const newCount = logoClicks + 1;
                if (newCount >= 3) { setShowPassModal(true); setLogoClicks(0); }
                else { setLogoClicks(newCount); setTimeout(() => setLogoClicks(0), 2000); }
            };

            const handlePassSubmit = (e) => {
                e.preventDefault();
                if (passInput === '1234') { setIsAdmin(true); setShowPassModal(false); setPassInput(''); setPassError(false); }
                else { setPassError(true); setPassInput(''); setTimeout(() => setPassError(false), 2000); }
            };

            const summary = useMemo(() => {
                let grandTotal = 0;
                const individu = {};
                const currentMonthIdx = senaraiBulan.indexOf(bulanSemasa);
                senaraiAhli.forEach(ahli => {
                    individu[ahli.toLowerCase()] = { namaPaparan: ahli, jumlah: 0, bayaranBulanan: {}, tunggakanBulan: [] };
                    senaraiBulan.forEach(b => individu[ahli.toLowerCase()].bayaranBulanan[b] = 0);
                });
                records.forEach(rekod => {
                    const nilai = rekod.type === 'masuk' ? rekod.amount : -rekod.amount;
                    grandTotal += nilai;
                    const namaKey = rekod.name.toLowerCase();
                    if (individu[namaKey]) {
                        individu[namaKey].jumlah += nilai;
                        individu[namaKey].bayaranBulanan[rekod.month] += nilai;
                    }
                });
                Object.values(individu).forEach(ahli => {
                    for (let i = 0; i <= currentMonthIdx; i++) {
                        if (ahli.bayaranBulanan[senaraiBulan[i]] < minAmount) {
                            ahli.tunggakanBulan.push(senaraiBulan[i].substring(0, 3));
                        }
                    }
                });
                return { grandTotal, individu };
            }, [records, senaraiAhli, bulanSemasa, minAmount]);

            const formatRM = (amount) => new Intl.NumberFormat('ms-MY', { style: 'currency', currency: 'MYR' }).format(amount);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.name || !formData.amount) return;
                const amountNum = parseFloat(formData.amount);
                if (formData.type === 'keluar' && amountNum > (summary.individu[formData.name.toLowerCase()]?.jumlah || 0)) {
                    setAlertMessage({ title: 'Baki Kurang', desc: `Baki tidak mencukupi untuk pengeluaran ini.` });
                    return;
                }
                setRecords([{ id: Date.now(), ...formData, amount: amountNum }, ...records]);
                setFormData({ ...formData, name: '', amount: '' });
            };

            const handleBulkSubmit = (e) => {
                e.preventDefault();
                const total = parseFloat(bulkFormData.amount);
                if (!total || senaraiAhli.length === 0) return;
                const perPerson = total / senaraiAhli.length;
                const lowBaki = senaraiAhli.filter(a => (summary.individu[a.toLowerCase()]?.jumlah || 0) < perPerson);
                if (lowBaki.length > 0) {
                    setAlertMessage({ title: 'Ditolak', desc: `Potongan RM${perPerson.toFixed(2)} gagal. Ahli baki kurang: ${lowBaki.join(', ')}` });
                    return;
                }
                const newRecs = senaraiAhli.map((a, i) => ({ id: Date.now() + i, name: a, month: bulkFormData.month, amount: perPerson, type: 'keluar' }));
                setRecords([...newRecs, ...records]);
                setBulkFormData({ ...bulkFormData, amount: '' });
            };

            // Loading Screen dengan bantuan teks untuk user
            if (isLoading && !hasCloudError) {
                return (
                    <div className="min-h-screen bg-[#f8f9fa] flex flex-col items-center justify-center p-6 text-center">
                        <div className="relative mb-8">
                            <div className="absolute inset-0 bg-emerald-500/20 rounded-full blur-[80px] animate-pulse"></div>
                            <img src="https://i.postimg.cc/prf5nQYN/Chat-GPT-Image-Apr-23-2026-09-52-51-AM-(1).png" className="h-28 rounded-[2rem] shadow-2xl relative z-10 border border-white" />
                        </div>
                        <div className="flex items-center gap-3 bg-white px-6 py-3 rounded-full shadow-sm border border-slate-100">
                            <Icon name="loader-2" className="w-5 h-5 text-emerald-600 animate-spin" />
                            <span className="text-sm font-bold text-slate-700 uppercase tracking-widest">Membuka Vault...</span>
                        </div>
                    </div>
                );
            }

            return (
                <div className="relative overflow-x-hidden pb-10 min-h-screen">
                    {/* Background */}
                    <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden">
                        <div className="absolute -top-20 -left-20 w-96 h-96 bg-emerald-100 rounded-full blur-[120px] animate-blob opacity-50"></div>
                        <div className="absolute top-1/2 -right-20 w-96 h-96 bg-blue-100 rounded-full blur-[120px] animate-blob opacity-50"></div>
                    </div>

                    <header className="relative z-10 max-w-5xl mx-auto px-4 pt-6 md:pt-10 mb-6 flex flex-col sm:flex-row justify-between items-center gap-4 text-center sm:text-left">
                        <div className="flex items-center gap-4 md:gap-5 flex-col sm:flex-row">
                            <div onClick={handleLogoClick} className="h-16 md:h-20 cursor-pointer active:scale-95 transition-transform shrink-0">
                                <img src="https://i.postimg.cc/prf5nQYN/Chat-GPT-Image-Apr-23-2026-09-52-51-AM-(1).png" className="h-full rounded-2xl shadow-xl border-2 border-white" />
                            </div>
                            <div>
                                <div className="flex items-center justify-center sm:justify-start gap-2">
                                    <h1 className="text-2xl md:text-4xl font-extrabold text-slate-900 tracking-tight">SoicAssy <span className="text-emerald-600">Vault</span></h1>
                                    {isAdmin && <Icon name="shield-check" className="w-5 h-5 text-emerald-500 animate-pulse" />}
                                </div>
                                <div className="flex flex-col">
                                    <p className="text-[10px] md:text-xs uppercase tracking-[0.2em] text-slate-400 font-bold mt-0.5">Sistem Simpanan Ahli {isAdmin && '• MOD ADMIN'}</p>
                                    <p className="text-[8px] md:text-[9px] text-slate-300 font-medium tracking-widest mt-0.5 uppercase">Create by MFR</p>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col items-center sm:items-end gap-2 w-full sm:w-auto">
                            <div className="flex gap-2 w-full justify-center">
                                <button 
                                    onClick={fetchDataFromCloud} 
                                    className={`p-3 rounded-xl bg-white border shadow-sm transition-all active:scale-90 ${hasCloudError ? 'text-rose-500 border-rose-100' : 'text-slate-400 hover:text-emerald-600'}`}
                                    title="Panggil Cloud"
                                >
                                    <Icon name="refresh-cw" className={`w-5 h-5 ${isLoading ? 'animate-spin' : ''}`} />
                                </button>
                                {isAdmin && (
                                    <React.Fragment>
                                        <button onClick={() => window.confirm('Padam cache peranti?') && (localStorage.clear() || window.location.reload())} className="p-3 rounded-xl bg-white border text-slate-400 shadow-sm hover:text-rose-500 transition-colors">
                                            <Icon name="database" className="w-5 h-5" />
                                        </button>
                                        <button onClick={syncToGoogleSheets} disabled={isSyncing} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl text-xs font-bold shadow-lg shadow-blue-600/20 active:scale-95 transition-all">
                                            {isSyncing ? 'Proses...' : 'Simpan Cloud'}
                                        </button>
                                    </React.Fragment>
                                )}
                            </div>
                            {syncStatus && <div className={`text-[9px] font-bold px-3 py-1.5 rounded-full animate-bounce ${syncStatus.type === 'error' ? 'bg-rose-50 text-rose-500' : 'bg-emerald-50 text-emerald-600'}`}>{syncStatus.message}</div>}
                        </div>
                    </header>

                    <main className="relative z-10 max-w-5xl mx-auto px-4 space-y-6">
                        {/* Summary Card */}
                        <div className="bg-slate-900 rounded-[2.5rem] p-8 md:p-12 shadow-2xl relative overflow-hidden border border-slate-800 group">
                             <div className="absolute top-0 right-0 w-80 h-80 bg-emerald-500/10 rounded-full blur-[100px] -mr-32 -mt-32"></div>
                            <div className="relative z-10 text-center sm:text-left">
                                <p className="text-xs text-slate-400 uppercase tracking-[0.4em] mb-3 flex items-center justify-center sm:justify-start gap-2">
                                    <div className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                                    Dana Terkumpul {tahunSemasa}
                                </p>
                                <h2 className="text-5xl md:text-7xl font-bold text-white tracking-tighter tabular-nums">{formatRM(summary.grandTotal)}</h2>
                            </div>
                        </div>

                        <div className={`grid grid-cols-1 ${isAdmin ? 'lg:grid-cols-3' : ''} gap-6 md:gap-8`}>
                            {isAdmin && (
                                <div className="space-y-6 order-1">
                                    {/* Borang Transaksi */}
                                    <section className="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-6 sm:p-7">
                                        <h3 className="text-sm font-bold mb-5 flex items-center gap-2 text-slate-900"><Icon name="plus-circle" className="text-emerald-600" /> Transaksi Baru</h3>
                                        <form onSubmit={handleSubmit} className="space-y-4">
                                            <div className="flex gap-2 p-1 bg-slate-50 rounded-xl border border-slate-100">
                                                <button type="button" onClick={()=>setFormData({...formData, type:'masuk'})} className={`flex-1 py-2.5 text-[10px] font-bold rounded-lg transition-all ${formData.type==='masuk'?'bg-white text-emerald-600 shadow-sm':'text-slate-400'}`}>MASUK</button>
                                                <button type="button" onClick={()=>setFormData({...formData, type:'keluar'})} className={`flex-1 py-2.5 text-[10px] font-bold rounded-lg transition-all ${formData.type==='keluar'?'bg-white text-rose-600 shadow-sm':'text-slate-400'}`}>KELUAR</button>
                                            </div>
                                            <select required value={formData.name} onChange={(e)=>setFormData({...formData, name:e.target.value})} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-xl text-xs outline-none focus:ring-2 focus:ring-emerald-500/10 transition-all appearance-none">
                                                <option value="">-- Pilih Nama --</option>
                                                {senaraiAhli.map(a => <option key={a} value={a}>{a}</option>)}
                                            </select>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                <select value={formData.month} onChange={(e)=>setFormData({...formData, month:e.target.value})} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-xl text-xs font-semibold outline-none appearance-none">
                                                    {senaraiBulan.map(b => <option key={b} value={b}>{b}</option>)}
                                                </select>
                                                <input type="number" step="0.01" value={formData.amount} onChange={(e)=>setFormData({...formData, amount:e.target.value})} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none" placeholder="RM 0.00" />
                                            </div>
                                            <button className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-[10px] uppercase shadow-lg shadow-slate-900/20 active:scale-95 transition-all tracking-widest">Sahkan Rekod</button>
                                        </form>
                                    </section>

                                    {/* Potongan Pukal */}
                                    <section className="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-6 sm:p-7 border-l-4 border-l-rose-500">
                                        <h3 className="text-sm font-bold mb-4 flex items-center gap-2 text-slate-900"><Icon name="pie-chart" className="text-rose-500" /> Potongan Pukal</h3>
                                        <form onSubmit={handleBulkSubmit} className="space-y-4 flex flex-col">
                                            <input type="number" step="0.01" value={bulkFormData.amount} onChange={(e)=>setBulkFormData({...bulkFormData, amount:e.target.value})} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none" placeholder="Total RM Potongan" />
                                            <button className="w-full py-3.5 bg-rose-600 hover:bg-rose-700 text-white rounded-xl font-bold text-[10px] transition-all active:scale-95 uppercase tracking-wider shadow-lg shadow-rose-600/10">Laksanakan Potongan</button>
                                        </form>
                                    </section>

                                    {/* Urus Ahli */}
                                    <section className="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-6 sm:p-7 border-l-4 border-l-amber-400">
                                        <h3 className="text-sm font-bold mb-2 flex items-center gap-2 text-slate-900"><Icon name="user-x" className="text-amber-500" /> Urus Ahli</h3>
                                        <p className="text-[10px] text-slate-400 mb-4 italic font-medium">Padam ahli daripada pangkalan data Vault.</p>
                                        <div className="flex flex-col sm:flex-row gap-3">
                                            <select 
                                                value={ahliToDeleteDropdown} 
                                                onChange={(e)=>setAhliToDeleteDropdown(e.target.value)} 
                                                className="w-full sm:flex-1 p-3.5 bg-slate-50 border border-slate-100 rounded-xl text-xs outline-none appearance-none"
                                            >
                                                <option value="">-- Nama --</option>
                                                {senaraiAhli.map(a => <option key={a} value={a}>{a}</option>)}
                                            </select>
                                            <button onClick={() => {if(ahliToDeleteDropdown) { setMemberToDelete(ahliToDeleteDropdown); setAhliToDeleteDropdown(''); }}} className="w-full sm:w-auto bg-rose-50 text-rose-600 hover:bg-rose-100 border border-rose-100 px-6 py-3.5 rounded-xl text-[10px] font-bold active:scale-95 transition-all">Padam</button>
                                        </div>
                                    </section>

                                    {/* Tetapan */}
                                    <section className="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-6 sm:p-7">
                                        <h3 className="text-sm font-bold mb-5 flex items-center gap-2 text-slate-900"><Icon name="settings" className="text-slate-400" /> Tetapan Sistem</h3>
                                        <div className="space-y-4">
                                            <div className="flex flex-col gap-1.5">
                                                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-[0.2em] px-1">Semak Tunggakan Hingga</label>
                                                <select value={bulanSemasa} onChange={(e)=>setBulanSemasa(e.target.value)} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none appearance-none">
                                                    {senaraiBulan.map(b => <option key={b} value={b}>{b}</option>)}
                                                </select>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                <div className="flex flex-col gap-1.5">
                                                     <label className="text-[9px] font-bold text-slate-400 uppercase text-center sm:text-left">Yuran RM</label>
                                                     <input type="number" value={minAmount} onChange={(e)=>setMinAmount(Number(e.target.value))} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold text-center sm:text-left outline-none" />
                                                </div>
                                                <div className="flex flex-col gap-1.5">
                                                     <label className="text-[9px] font-bold text-slate-400 uppercase text-center sm:text-left">Tahun</label>
                                                     <select value={tahunSemasa} onChange={(e)=>setTahunSemasa(e.target.value)} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold text-center sm:text-left appearance-none outline-none">
                                                        {senaraiTahun.map(y => <option key={y} value={y}>{y}</option>)}
                                                     </select>
                                                </div>
                                            </div>
                                        </div>
                                    </section>
                                </div>
                            )}

                            <div className={`space-y-6 ${isAdmin ? 'lg:col-span-2' : ''} order-2`}>
                                {isAdmin && (
                                    <section className="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-6 sm:p-7 overflow-hidden transition-all hover:shadow-md">
                                        <h3 className="text-sm font-bold mb-5 flex items-center gap-2 text-slate-900"><Icon name="coins" className="text-amber-500" /> Penyata Terperinci</h3>
                                        <div className="overflow-x-auto no-scrollbar -mx-6 sm:-mx-7 px-6 sm:px-7">
                                            <table className="w-full text-left min-w-[480px]">
                                                <thead>
                                                    <tr className="border-b border-slate-100 text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                                                        <th className="pb-4 px-2">Ahli</th>
                                                        <th className="pb-4 px-2">Bulan</th>
                                                        <th className="pb-4 px-2 text-right">Nilai (RM)</th>
                                                        <th className="pb-4 px-2 text-center">Aksi</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="text-[11px]">
                                                    {records.length === 0 ? (
                                                        <tr><td colSpan="4" className="py-12 text-center text-slate-300 italic font-medium">Tiada transaksi direkodkan dalam Vault</td></tr>
                                                    ) : (
                                                        records.map(r => (
                                                            <tr key={r.id} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                                                <td className="py-4 px-2 font-bold text-slate-700">{r.name}</td>
                                                                <td className="py-4 px-2 text-slate-500 font-medium">{r.month}</td>
                                                                <td className={`py-4 px-2 text-right font-black whitespace-nowrap ${r.type==='masuk'?'text-emerald-600':'text-rose-600'}`}>
                                                                    {r.type==='masuk'?'+':'-'} {r.amount.toFixed(2)}
                                                                </td>
                                                                <td className="py-4 px-2 text-center">
                                                                    <button onClick={()=>setRecords(records.filter(x=>x.id!==r.id))} className="text-rose-400 hover:text-rose-600 transition-all p-2 bg-rose-50 hover:bg-rose-100 rounded-xl" title="Padam Rekod"><Icon name="trash-2" className="w-4 h-4" /></button>
                                                                </td>
                                                            </tr>
                                                        ))
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </section>
                                )}

                                <section className="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-6 sm:p-7 transition-all hover:shadow-md">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-sm font-bold flex items-center gap-2 text-slate-900"><Icon name="users" className="text-blue-600" /> Ringkasan Ahli</h3>
                                        <span className="text-[10px] font-bold text-slate-400 uppercase bg-slate-50 px-4 py-1.5 rounded-full border border-slate-100">{senaraiAhli.length} Ahli</span>
                                    </div>
                                    
                                    {isAdmin && (
                                        <div className="mb-8 p-5 sm:p-6 bg-slate-50 rounded-[2.5rem] border border-slate-100 shadow-inner relative overflow-hidden group">
                                            <div className="absolute top-0 right-0 w-24 h-24 bg-emerald-500/5 rounded-full blur-2xl -mr-10 -mt-10 group-hover:scale-150 transition-transform duration-700"></div>
                                            <div className="flex items-center gap-2 mb-4 px-1 relative z-10">
                                                <Icon name="user-plus" className="w-4 h-4 text-emerald-600" />
                                                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Daftar Ahli Baru</label>
                                            </div>
                                            <div className="flex flex-col sm:flex-row gap-3 relative z-10 w-full">
                                                <div className="relative w-full">
                                                    <Icon name="user" className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300" />
                                                    <input 
                                                        type="text" 
                                                        placeholder="Contoh: Ali Bin Abu" 
                                                        value={newAhli} 
                                                        onChange={(e)=>setNewAhli(e.target.value)} 
                                                        className="w-full pl-10 pr-4 py-4 bg-white rounded-2xl text-xs border border-slate-200 outline-none focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500 transition-all font-medium" 
                                                    />
                                                </div>
                                                <button 
                                                    onClick={()=>{if(newAhli){setSenaraiAhli([...senaraiAhli, newAhli]); setNewAhli('')}}} 
                                                    className="w-full sm:w-auto bg-slate-900 hover:bg-slate-800 text-white px-8 py-4 rounded-2xl text-[10px] font-bold shadow-xl shadow-slate-900/20 active:scale-95 transition-all flex items-center justify-center gap-2 uppercase tracking-widest shrink-0"
                                                >
                                                    <Icon name="plus" className="w-3.5 h-3.5" />
                                                    Tambah
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {senaraiAhli.length === 0 ? (
                                        <div className="text-center py-16 bg-slate-50/50 rounded-[2rem] border-dashed border-2 border-slate-200">
                                            <Icon name="users" className="w-12 h-12 text-slate-200 mx-auto mb-4" />
                                            <p className="text-xs text-slate-400 italic">Pangkalan data ahli masih kosong</p>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {Object.values(summary.individu).sort((a,b)=>b.jumlah-a.jumlah).map((a, i) => (
                                                <div key={i} className="flex justify-between items-center p-4 sm:p-5 bg-white hover:bg-slate-50 rounded-[2rem] border border-slate-100 shadow-sm transition-all group relative">
                                                    <div className="flex items-center gap-3 sm:gap-4">
                                                        <div className="w-10 h-10 sm:w-11 sm:h-11 rounded-full bg-slate-900 text-white flex items-center justify-center text-xs font-bold border-4 border-white shadow-md shrink-0 uppercase tracking-tighter">{a.namaPaparan.substring(0,2)}</div>
                                                        <div className="flex flex-col">
                                                            <span className="font-bold text-[13px] text-slate-800 leading-tight">{a.namaPaparan}</span>
                                                            <div className="flex flex-wrap gap-1 mt-1.5">
                                                                {a.tunggakanBulan.length > 0 ? (
                                                                    a.tunggakanBulan.map(t => (
                                                                        <span key={t} className="text-[8px] font-bold text-rose-500 bg-rose-50 px-2 py-0.5 rounded-full border border-rose-100">{t}</span>
                                                                    ))
                                                                ) : (
                                                                    <span className="text-[9px] font-bold text-emerald-500 flex items-center gap-1"><Icon name="check-circle" className="w-3 h-3" /> Lengkap</span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-2 sm:gap-3 shrink-0">
                                                        <div className="text-right">
                                                            <span className={`text-[12px] sm:text-[13px] font-black whitespace-nowrap tracking-tight ${a.jumlah>=0?'text-slate-900':'text-rose-600'}`}>{formatRM(a.jumlah)}</span>
                                                        </div>
                                                        {isAdmin && (
                                                            <button onClick={()=>setMemberToDelete(a.namaPaparan)} className="text-rose-500 bg-rose-50 border border-rose-100 hover:bg-rose-100 transition-all p-2 rounded-xl flex items-center justify-center shrink-0" title="Padam Ahli">
                                                                <Icon name="trash-2" className="w-4 h-4" />
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </section>
                            </div>
                        </div>
                    </main>

                    {/* Modal Kata Laluan */}
                    {showPassModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-300">
                            <div className={`bg-white rounded-[3rem] p-10 max-w-sm w-full shadow-2xl border border-white transform transition-all duration-300 ${passError ? 'animate-shake' : 'scale-100'}`}>
                                <div className="flex justify-center mb-8">
                                    <div className="w-20 h-20 rounded-3xl bg-slate-900 flex items-center justify-center shadow-2xl ring-8 ring-slate-100">
                                        <Icon name="lock" className="w-8 h-8 text-white" />
                                    </div>
                                </div>
                                <h3 className="text-2xl font-bold mb-2 text-center text-slate-900 uppercase tracking-tighter">Akses Admin</h3>
                                <p className="text-xs text-slate-400 mb-10 text-center px-4 leading-relaxed font-medium italic">Kod 4-digit diperlukan.</p>
                                <form onSubmit={handlePassSubmit} className="space-y-6">
                                    <input 
                                        autoFocus 
                                        type="password" 
                                        maxLength="4"
                                        inputMode="numeric"
                                        placeholder="••••" 
                                        value={passInput} 
                                        onChange={(e)=>setPassInput(e.target.value)} 
                                        className={`w-full text-center text-4xl tracking-[1.5rem] font-black py-7 rounded-[2rem] border-2 transition-all outline-none ${passError ? 'border-rose-300 bg-rose-50 text-rose-600' : 'border-slate-100 focus:border-slate-900 bg-slate-50'}`} 
                                    />
                                    <div className="flex flex-col gap-3">
                                        <button type="submit" className="w-full py-5 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-[1.5rem] shadow-xl shadow-slate-900/20 active:scale-95 transition-all uppercase text-xs tracking-widest">Sahkan Kod</button>
                                        <button type="button" onClick={()=>setShowPassModal(false)} className="w-full text-[10px] font-bold text-slate-400 py-2 hover:text-slate-600 uppercase tracking-[0.3em] transition-colors">Batalkan</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Padam Ahli */}
                    {memberToDelete && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-200">
                            <div className="bg-white rounded-[3rem] p-10 max-w-sm w-full text-center border border-white shadow-2xl">
                                <div className="w-20 h-20 rounded-full bg-rose-50 flex items-center justify-center mx-auto mb-6 border-4 border-rose-100 shadow-inner">
                                    <Icon name="user-x" className="w-10 h-10 text-rose-500" />
                                </div>
                                <h3 className="font-bold text-slate-900 text-2xl mb-3 tracking-tighter">Padam Ahli?</h3>
                                <p className="text-xs text-slate-400 mb-10 leading-relaxed font-medium">Rekod <b>{memberToDelete}</b> akan dipadam secara kekal daripada pengkalan data Vault.</p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={()=>{
                                        setSenaraiAhli(senaraiAhli.filter(x=>x.toLowerCase()!==memberToDelete.toLowerCase()));
                                        setRecords(records.filter(x=>x.name.toLowerCase()!==memberToDelete.toLowerCase()));
                                        setMemberToDelete(null);
                                    }} className="w-full py-4.5 bg-rose-600 hover:bg-rose-700 text-white rounded-2xl font-bold text-xs shadow-lg shadow-rose-600/20 active:scale-95 transition-all uppercase tracking-widest">Padam Segera</button>
                                    <button onClick={()=>setMemberToDelete(null)} className="w-full py-4.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl font-bold text-xs active:scale-95 transition-all uppercase tracking-widest">Kekalkan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Amaran Sistem */}
                    {alertMessage && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white rounded-[2.5rem] p-10 max-w-xs w-full text-center border border-white shadow-2xl">
                                <div className="w-20 h-20 rounded-full bg-amber-50 flex items-center justify-center mx-auto mb-6 shadow-inner">
                                    <Icon name="alert-triangle" className="w-10 h-10 text-amber-500" />
                                </div>
                                <h3 className="font-bold text-xl mb-3 text-slate-900 uppercase tracking-tighter">{alertMessage.title}</h3>
                                <p className="text-xs text-slate-400 mb-8 leading-relaxed font-medium italic">{alertMessage.desc}</p>
                                <button onClick={()=>setAlertMessage(null)} className="w-full py-4.5 bg-slate-900 text-white rounded-2xl font-bold text-xs active:scale-95 transition-all uppercase tracking-widest shadow-xl">Faham & Selesai</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
