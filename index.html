<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoicAssy Vault</title>
    <!-- Pustaka Utama (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-blob { animation: blob 15s infinite; }
        @keyframes blob { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.15); opacity: 0.6; } }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f8f9fa] text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // Import Lucide Icons (Mapping for CDN version)
        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2dPm0Tr55SfLx7raE9DFI7HYsxhlO7SJdXbYNukdQ-Bes9LD9KcoUh3Y4fFIFVXpi/exec";

        function App() {
            const getStoredData = (key, defaultValue) => {
                try {
                    const saved = localStorage.getItem(key);
                    return saved ? JSON.parse(saved) : defaultValue;
                } catch (e) { return defaultValue; }
            };

            const [isAdmin, setIsAdmin] = useState(false);
            const [logoClicks, setLogoClicks] = useState(0);
            const [showPassModal, setShowPassModal] = useState(false);
            const [passInput, setPassInput] = useState('');
            const [passError, setPassError] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [syncStatus, setSyncStatus] = useState(null);
            const [hasCloudError, setHasCloudError] = useState(false);

            const [senaraiAhli, setSenaraiAhli] = useState(() => getStoredData('soicassy_members', []));
            const [records, setRecords] = useState(() => getStoredData('soicassy_records', []));
            const [minAmount, setMinAmount] = useState(() => getStoredData('soicassy_min_amount', 20));
            const [tahunSemasa, setTahunSemasa] = useState(() => getStoredData('soicassy_year', new Date().getFullYear().toString()));

            const senaraiBulan = ['Januari', 'Februari', 'Mac', 'April', 'Mei', 'Jun', 'Julai', 'Ogos', 'September', 'Oktober', 'November', 'Disember'];
            const [bulanSemasa, setBulanSemasa] = useState(senaraiBulan[new Date().getMonth()]);
            const [alertMessage, setAlertMessage] = useState(null);
            const [memberToDelete, setMemberToDelete] = useState(null);
            const [newAhli, setNewAhli] = useState('');
            const [ahliToDeleteDropdown, setAhliToDeleteDropdown] = useState('');
            const [formData, setFormData] = useState({ name: '', month: 'Januari', amount: '', type: 'masuk' });
            const [bulkFormData, setBulkFormData] = useState({ month: 'Januari', amount: '' });

            const senaraiTahun = useMemo(() => {
                const years = [];
                for (let i = 2024; i <= 2050; i++) years.push(i.toString());
                return years;
            }, []);

            const fetchDataFromCloud = async () => {
                if (!SCRIPT_URL) { setIsLoading(false); return; }
                setIsLoading(true);
                setHasCloudError(false);
                try {
                    const response = await fetch(SCRIPT_URL, { method: 'GET', mode: 'cors', cache: 'no-cache' });
                    if (!response.ok) throw new Error('Response not ok');
                    const cloudData = await response.json();
                    if (cloudData) {
                        if (cloudData.senaraiAhli) setSenaraiAhli(cloudData.senaraiAhli);
                        if (cloudData.records) setRecords(cloudData.records);
                        if (cloudData.minAmount) setMinAmount(cloudData.minAmount);
                        if (cloudData.tahunSemasa) setTahunSemasa(cloudData.tahunSemasa);
                        setSyncStatus({ type: 'success', message: 'Data Cloud dikemaskini!' });
                        setTimeout(() => setSyncStatus(null), 3000);
                    }
                } catch (error) {
                    setHasCloudError(true);
                    setSyncStatus({ type: 'error', message: 'Gagal Cloud. Mod Offline.' });
                } finally { setIsLoading(false); }
            };

            useEffect(() => { fetchDataFromCloud(); }, []);
            useEffect(() => {
                localStorage.setItem('soicassy_members', JSON.stringify(senaraiAhli));
                localStorage.setItem('soicassy_records', JSON.stringify(records));
                localStorage.setItem('soicassy_min_amount', JSON.stringify(minAmount));
                localStorage.setItem('soicassy_year', JSON.stringify(tahunSemasa));
            }, [senaraiAhli, records, minAmount, tahunSemasa]);

            const syncToGoogleSheets = async () => {
                if (!SCRIPT_URL) return;
                setIsSyncing(true);
                setSyncStatus(null);
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ records, senaraiAhli, minAmount, tahunSemasa })
                    });
                    setSyncStatus({ type: 'success', message: 'Simpan Berjaya!' });
                    setTimeout(() => setSyncStatus(null), 3000);
                } catch (error) {
                    setSyncStatus({ type: 'error', message: 'Gagal Simpan.' });
                } finally { setIsSyncing(false); }
            };

            const handleLogoClick = () => {
                if (isAdmin) { setIsAdmin(false); setLogoClicks(0); return; }
                const newCount = logoClicks + 1;
                if (newCount >= 3) { setShowPassModal(true); setLogoClicks(0); }
                else { setLogoClicks(newCount); setTimeout(() => setLogoClicks(0), 2000); }
            };

            const handlePassSubmit = (e) => {
                e.preventDefault();
                if (passInput === '1234') { setIsAdmin(true); setShowPassModal(false); setPassInput(''); setPassError(false); }
                else { setPassError(true); setPassInput(''); setTimeout(() => setPassError(false), 2000); }
            };

            const summary = useMemo(() => {
                let grandTotal = 0;
                const individu = {};
                const currentMonthIdx = senaraiBulan.indexOf(bulanSemasa);
                senaraiAhli.forEach(ahli => {
                    individu[ahli.toLowerCase()] = { namaPaparan: ahli, jumlah: 0, bayaranBulanan: {}, tunggakanBulan: [] };
                    senaraiBulan.forEach(b => individu[ahli.toLowerCase()].bayaranBulanan[b] = 0);
                });
                records.forEach(rekod => {
                    const nilai = rekod.type === 'masuk' ? rekod.amount : -rekod.amount;
                    grandTotal += nilai;
                    const namaKey = rekod.name.toLowerCase();
                    if (individu[namaKey]) {
                        individu[namaKey].jumlah += nilai;
                        individu[namaKey].bayaranBulanan[rekod.month] += nilai;
                    }
                });
                Object.values(individu).forEach(ahli => {
                    for (let i = 0; i <= currentMonthIdx; i++) {
                        if (ahli.bayaranBulanan[senaraiBulan[i]] < minAmount) {
                            ahli.tunggakanBulan.push(senaraiBulan[i].substring(0, 3));
                        }
                    }
                });
                return { grandTotal, individu };
            }, [records, senaraiAhli, bulanSemasa, minAmount]);

            const formatRM = (amount) => new Intl.NumberFormat('ms-MY', { style: 'currency', currency: 'MYR' }).format(amount);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.name || !formData.amount) return;
                const amountNum = parseFloat(formData.amount);
                if (formData.type === 'keluar' && amountNum > (summary.individu[formData.name.toLowerCase()]?.jumlah || 0)) {
                    setAlertMessage({ title: 'Baki Kurang', desc: `Baki tidak mencukupi.` });
                    return;
                }
                setRecords([{ id: Date.now(), ...formData, amount: amountNum }, ...records]);
                setFormData({ ...formData, name: '', amount: '' });
            };

            const handleBulkSubmit = (e) => {
                e.preventDefault();
                const total = parseFloat(bulkFormData.amount);
                if (!total || senaraiAhli.length === 0) return;
                const perPerson = total / senaraiAhli.length;
                const lowBaki = senaraiAhli.filter(a => (summary.individu[a.toLowerCase()]?.jumlah || 0) < perPerson);
                if (lowBaki.length > 0) {
                    setAlertMessage({ title: 'Ditolak', desc: `Ahli berikut baki tidak cukup: ${lowBaki.join(', ')}` });
                    return;
                }
                const newRecs = senaraiAhli.map((a, i) => ({ id: Date.now() + i, name: a, month: bulkFormData.month, amount: perPerson, type: 'keluar' }));
                setRecords([...newRecs, ...records]);
                setBulkFormData({ ...bulkFormData, amount: '' });
            };

            if (isLoading && !hasCloudError) {
                return (
                    <div className="min-h-screen bg-[#f8f9fa] flex flex-col items-center justify-center p-6 text-center">
                        <img src="https://i.postimg.cc/prf5nQYN/Chat-GPT-Image-Apr-23-2026-09-52-51-AM-(1).png" className="h-28 rounded-[2rem] shadow-2xl mb-8" />
                        <div className="flex items-center gap-3 bg-white px-6 py-3 rounded-full shadow-sm border">
                            <Icon name="loader-2" className="w-5 h-5 text-emerald-600 animate-spin" />
                            <span className="text-sm font-bold text-slate-700 uppercase">Membuka Vault...</span>
                        </div>
                    </div>
                );
            }

            return (
                <div className="relative overflow-x-hidden pb-10">
                    {/* Background */}
                    <div className="fixed inset-0 z-0 pointer-events-none">
                        <div className="absolute -top-20 -left-20 w-96 h-96 bg-emerald-100 rounded-full blur-[100px] animate-blob"></div>
                        <div className="absolute top-1/2 -right-20 w-96 h-96 bg-blue-50 rounded-full blur-[100px] animate-blob"></div>
                    </div>

                    <header className="relative z-10 max-w-5xl mx-auto px-4 pt-6 md:pt-10 mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-4">
                            <div onClick={handleLogoClick} className="h-14 md:h-20 cursor-pointer active:scale-95 transition-transform shrink-0">
                                <img src="https://i.postimg.cc/prf5nQYN/Chat-GPT-Image-Apr-23-2026-09-52-51-AM-(1).png" className="h-full rounded-2xl shadow-xl border border-white" />
                            </div>
                            <div className="text-center sm:text-left">
                                <div className="flex items-center justify-center sm:justify-start gap-2">
                                    <h1 className="text-2xl md:text-4xl font-extrabold text-slate-900 tracking-tight">SoicAssy <span className="text-emerald-600">Vault</span></h1>
                                    {isAdmin && <Icon name="shield-check" className="w-5 h-5 text-emerald-500 animate-pulse" />}
                                </div>
                                <div className="flex flex-col sm:items-start items-center">
                                    <p className="text-[10px] md:text-xs uppercase tracking-[0.2em] text-slate-400 font-bold mt-0.5">Sistem Simpanan Ahli {isAdmin && '• MOD ADMIN'}</p>
                                    <p className="text-[8px] md:text-[9px] text-slate-300 font-medium tracking-widest mt-0.5 uppercase">Create by MFR</p>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col items-center sm:items-end gap-2 w-full sm:w-auto">
                            <div className="flex gap-2 w-full justify-center">
                                <button onClick={fetchDataFromCloud} className="p-3 rounded-xl bg-white border shadow-sm text-slate-400 hover:text-emerald-600">
                                    <Icon name="refresh-cw" className={`w-5 h-5 ${isLoading ? 'animate-spin' : ''}`} />
                                </button>
                                {isAdmin && (
                                    <React.Fragment>
                                        <button onClick={() => window.confirm('Reset cache?') && (localStorage.clear() || window.location.reload())} className="p-3 rounded-xl bg-white border text-slate-400 shadow-sm">
                                            <Icon name="database" className="w-5 h-5" />
                                        </button>
                                        <button onClick={syncToGoogleSheets} disabled={isSyncing} className="bg-blue-600 text-white px-6 py-3 rounded-xl text-xs font-bold shadow-lg">
                                            {isSyncing ? 'Simpan...' : 'Simpan Cloud'}
                                        </button>
                                    </React.Fragment>
                                )}
                            </div>
                            {syncStatus && <div className="text-[9px] font-bold px-3 py-1.5 rounded-full bg-emerald-50 text-emerald-600">{syncStatus.message}</div>}
                        </div>
                    </header>

                    <main className="relative z-10 max-w-5xl mx-auto px-4 space-y-6">
                        <div className="bg-slate-900 rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden border border-slate-800">
                            <div className="relative z-10">
                                <p className="text-xs text-slate-400 uppercase tracking-widest mb-2">Dana Terkumpul {tahunSemasa}</p>
                                <h2 className="text-4xl md:text-6xl font-bold text-white tracking-tighter">{formatRM(summary.grandTotal)}</h2>
                            </div>
                        </div>

                        <div className={`grid grid-cols-1 ${isAdmin ? 'lg:grid-cols-3' : ''} gap-6`}>
                            {isAdmin && (
                                <div className="space-y-6 order-1">
                                    {/* Borang Transaksi */}
                                    <section className="bg-white rounded-3xl shadow-sm border p-6">
                                        <h3 className="text-sm font-bold mb-4 flex items-center gap-2"><Icon name="plus" className="text-emerald-600" /> Transaksi</h3>
                                        <form onSubmit={handleSubmit} className="space-y-3">
                                            <div className="flex gap-2 p-1 bg-slate-50 rounded-xl">
                                                <button type="button" onClick={()=>setFormData({...formData, type:'masuk'})} className={`flex-1 py-2 text-[10px] font-bold rounded-lg ${formData.type==='masuk'?'bg-white text-emerald-600 shadow-sm':'text-slate-400'}`}>MASUK</button>
                                                <button type="button" onClick={()=>setFormData({...formData, type:'keluar'})} className={`flex-1 py-2 text-[10px] font-bold rounded-lg ${formData.type==='keluar'?'bg-white text-rose-600 shadow-sm':'text-slate-400'}`}>KELUAR</button>
                                            </div>
                                            <select required value={formData.name} onChange={(e)=>setFormData({...formData, name:e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl text-xs">
                                                <option value="">-- Pilih Ahli --</option>
                                                {senaraiAhli.map(a => <option key={a} value={a}>{a}</option>)}
                                            </select>
                                            <div className="grid grid-cols-2 gap-2">
                                                <select value={formData.month} onChange={(e)=>setFormData({...formData, month:e.target.value})} className="p-3 bg-slate-50 border rounded-xl text-xs">
                                                    {senaraiBulan.map(b => <option key={b} value={b}>{b}</option>)}
                                                </select>
                                                <input type="number" step="0.01" value={formData.amount} onChange={(e)=>setFormData({...formData, amount:e.target.value})} className="p-3 bg-slate-50 border rounded-xl text-xs font-bold" placeholder="RM 0.00" />
                                            </div>
                                            <button className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-[10px] uppercase">Sahkan</button>
                                        </form>
                                    </section>

                                    {/* Potongan Pukal */}
                                    <section className="bg-white rounded-3xl shadow-sm border p-6 border-l-4 border-l-rose-500">
                                        <h3 className="text-sm font-bold mb-4 flex items-center gap-2"><Icon name="pie-chart" className="text-rose-500" /> Pukal</h3>
                                        <form onSubmit={handleBulkSubmit} className="space-y-3">
                                            <input type="number" step="0.01" value={bulkFormData.amount} onChange={(e)=>setBulkFormData({...bulkFormData, amount:e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold" placeholder="Jumlah Total RM" />
                                            <button className="w-full py-3 bg-rose-600 text-white rounded-xl font-bold text-[10px]">Laksanakan</button>
                                        </form>
                                    </section>

                                    {/* Tetapan */}
                                    <section className="bg-white rounded-3xl shadow-sm border p-6">
                                        <h3 className="text-sm font-bold mb-4 flex items-center gap-2"><Icon name="settings" className="text-slate-400" /> Tetapan</h3>
                                        <div className="space-y-3">
                                            <select value={bulanSemasa} onChange={(e)=>setBulanSemasa(e.target.value)} className="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold">
                                                {senaraiBulan.map(b => <option key={b} value={b}>{b}</option>)}
                                            </select>
                                            <div className="grid grid-cols-2 gap-2">
                                                <input type="number" value={minAmount} onChange={(e)=>setMinAmount(Number(e.target.value))} className="p-3 bg-slate-50 border rounded-xl text-xs font-bold text-center" title="Yuran RM" />
                                                <select value={tahunSemasa} onChange={(e)=>setTahunSemasa(e.target.value)} className="p-3 bg-slate-50 border rounded-xl text-xs font-bold text-center">
                                                    {senaraiTahun.map(y => <option key={y} value={y}>{y}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                    </section>
                                </div>
                            )}

                            <div className={`space-y-6 ${isAdmin ? 'lg:col-span-2' : ''} order-2`}>
                                {isAdmin && (
                                    <section className="bg-white rounded-3xl shadow-sm border p-6 overflow-hidden">
                                        <h3 className="text-sm font-bold mb-4 flex items-center gap-2"><Icon name="coins" className="text-amber-500" /> Penyata</h3>
                                        <div className="overflow-x-auto no-scrollbar">
                                            <table className="w-full text-left min-w-[400px]">
                                                <thead>
                                                    <tr className="border-b text-[9px] text-slate-400 font-bold uppercase tracking-widest">
                                                        <th className="pb-3">Ahli</th>
                                                        <th className="pb-3">Bulan</th>
                                                        <th className="pb-3 text-right">Nilai</th>
                                                        <th className="pb-3 text-center">Tindakan</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="text-[11px]">
                                                    {records.map(r => (
                                                        <tr key={r.id} className="border-b">
                                                            <td className="py-3 font-bold">{r.name}</td>
                                                            <td className="py-3">{r.month}</td>
                                                            <td className={`py-3 text-right font-bold ${r.type==='masuk'?'text-emerald-600':'text-rose-600'}`}>{r.type==='masuk'?'+':'-'} {r.amount.toFixed(2)}</td>
                                                            <td className="py-3 text-center">
                                                                <button onClick={()=>setRecords(records.filter(x=>x.id!==r.id))} className="text-slate-300 hover:text-rose-500"><Icon name="trash-2" className="w-3.5 h-3.5" /></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </section>
                                )}

                                <section className="bg-white rounded-3xl shadow-sm border p-6">
                                    <h3 className="text-sm font-bold mb-4 flex items-center gap-2"><Icon name="users" className="text-blue-600" /> Ringkasan Ahli</h3>
                                    
                                    {isAdmin && (
                                        <div className="mb-6 p-4 bg-slate-50 rounded-2xl flex gap-2">
                                            <input type="text" value={newAhli} onChange={(e)=>setNewAhli(e.target.value)} className="flex-1 p-2 bg-white border rounded-xl text-xs" placeholder="Nama Baru" />
                                            <button onClick={()=>{if(newAhli){setSenaraiAhli([...senaraiAhli, newAhli]); setNewAhli('')}}} className="bg-emerald-600 text-white px-4 rounded-xl text-xs font-bold">Tambah</button>
                                        </div>
                                    )}

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        {Object.values(summary.individu).sort((a,b)=>b.jumlah-a.jumlah).map((a, i) => (
                                            <div key={i} className="flex justify-between items-center p-3 bg-slate-50 rounded-2xl group">
                                                <div className="flex items-center gap-2">
                                                    <div className="w-8 h-8 rounded-full bg-white flex items-center justify-center text-[10px] font-bold border">{a.namaPaparan.substring(0,2).toUpperCase()}</div>
                                                    <div className="flex flex-col">
                                                        <span className="font-bold text-xs">{a.namaPaparan}</span>
                                                        <span className="text-[8px] text-rose-500 font-bold">{a.tunggakanBulan.join(', ')}</span>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <span className={`text-xs font-bold ${a.jumlah>=0?'text-slate-900':'text-rose-600'}`}>{formatRM(a.jumlah)}</span>
                                                    {isAdmin && <button onClick={()=>setMemberToDelete(a.namaPaparan)} className="text-slate-300 hover:text-rose-500"><Icon name="user-x" className="w-3.5 h-3.5" /></button>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        </div>
                    </main>

                    {/* Password Modal */}
                    {showPassModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md">
                            <div className="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl">
                                <h3 className="text-xl font-bold mb-6 text-center">Akses Admin</h3>
                                <form onSubmit={handlePassSubmit} className="space-y-4">
                                    <input autoFocus type="password" placeholder="••••" value={passInput} onChange={(e)=>setPassInput(e.target.value)} className="w-full text-center text-3xl py-4 border rounded-2xl outline-none focus:border-slate-900" />
                                    <button type="submit" className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold">MASUK</button>
                                    <button type="button" onClick={()=>setShowPassModal(false)} className="w-full text-xs text-slate-400">BATAL</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Alert Modal */}
                    {alertMessage && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/40">
                            <div className="bg-white rounded-3xl p-8 max-w-xs w-full text-center">
                                <Icon name="alert-triangle" className="w-12 h-12 text-rose-500 mx-auto mb-4" />
                                <h3 className="font-bold mb-2">{alertMessage.title}</h3>
                                <p className="text-xs text-slate-400 mb-6">{alertMessage.desc}</p>
                                <button onClick={()=>setAlertMessage(null)} className="w-full py-3 bg-slate-900 text-white rounded-xl font-bold text-xs">TUTUP</button>
                            </div>
                        </div>
                    )}

                    {/* Delete Modal */}
                    {memberToDelete && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/40">
                            <div className="bg-white rounded-3xl p-8 max-w-xs w-full text-center">
                                <Icon name="user-x" className="w-12 h-12 text-rose-500 mx-auto mb-4" />
                                <h3 className="font-bold mb-4">Padam {memberToDelete}?</h3>
                                <div className="flex gap-2">
                                    <button onClick={()=>{
                                        setSenaraiAhli(senaraiAhli.filter(x=>x.toLowerCase()!==memberToDelete.toLowerCase()));
                                        setRecords(records.filter(x=>x.name.toLowerCase()!==memberToDelete.toLowerCase()));
                                        setMemberToDelete(null);
                                    }} className="flex-1 py-3 bg-rose-600 text-white rounded-xl font-bold text-xs">PADAM</button>
                                    <button onClick={()=>setMemberToDelete(null)} className="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-xs">BATAL</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
